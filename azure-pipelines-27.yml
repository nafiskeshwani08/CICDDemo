# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
- master

pool:
  name: Default


steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

- script: |
    echo Add other tasks to build, test, and deploy your project.
    echo See https://aka.ms/yaml
  displayName: 'Run a multi-line script'
- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      # 1. Setup your Variables
      $SourceUri = "https://aa-saleseng-us-4sbx.cloud.automationanywhere.digital"
      $TargetUri = "https://aa-saleseng-use-2.my.automationanywhere.digital"
      $SourceUser = "nafis.keshwani"
      $SourcePassword = "Automation@123"
      $TargetUser = "nafis.keshwani"
      $TargetApiKey = "h2{ZXUUmvByt19=TQYB08{8:q9HXKZZ9Jx=]LJ3~" # Ideally, pull this from a Pipeline Secret!
      
      # 2. Get Source Auth Token (as you did before)
      $AuthBody = @{ "username" = $SourceUser; "password" = $SourcePassword } | ConvertTo-Json
      $AuthResponse = Invoke-RestMethod -Uri "$SourceUri/v2/authentication" -Method Post -Body $AuthBody -ContentType "application/json"
      
      
      $PromotionBody = @{
          "name" = "PromoteBot_$(Get-Date -Format 'yyyyMMdd_HHmmss')"
          "files" = @(
              @{
                  "id" = 101165375  # <--- Replace with your actual Bot ID
                  "version" = 1
              }
          )
          "includeDependencies" = $true
          "packageIds" = @(0) # 0 usually tells the CR to auto-generate the package
          "targetControlRoom" = @{
              "url" = $TargetUri
              "username" = $TargetUser
              "apiKey" = $TargetApiKey
              "skipExistingFiles" = $false
          }
          "label" = "PRODUCTION" # This is often required for the CR to find the file path
      } | ConvertTo-Json -Depth 10
      
      # Execute the call
      $Header = @{ "X-Authorization" = $AuthResponse.token }
      $Result = Invoke-RestMethod -Uri "$SourceUri/v2/blm/promoteBot" -Method Post -Headers $Header -Body $PromotionBody -ContentType "application/json"
      
      try {
          $Result = Invoke-RestMethod -Uri $PromoteUri -Method Post -Headers $Header -Body $PromotionBody -ContentType "application/json"
          Write-Host "Promotion successfully triggered! Request ID: $($Result.requestId)"
      }
      catch {
          Write-Error "Promotion failed: $($_.Exception.Message)"
          # This helps see the specific AA error message
          $ErrorDetails = $_.Exception.Response.Content.ReadAsStringAsync().Result
          Write-Host "Server Response: $ErrorDetails"
      }
